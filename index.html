<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Artemis II Tracker</title>
  <link rel="icon" href="favicon-32x32.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: #000; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100%;
      height: 100vh;
      padding: 8px;
      gap: 8px;
      background: #000;
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #000;
      overflow: hidden;
    }
    .panel-title {
      padding: 10px 14px;
      background: #000;
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-transform: capitalize;
      line-height: 1.2;
    }
    .panel-body {
      flex: 1;
      min-height: 0;
      background: #fff;
    }
    .nasa-panel {
      grid-column: 1;
      grid-row: 1 / 3;
    }
    .nasa {
      width: 100%;
      height: 100%;
      border: none;
    }
    .yt-cell {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .yt-cell iframe {
      width: 100% !important;
      height: 100% !important;
      border: none;
    }
  </style>
</head>
<body>
  <div class="grid">
    <!-- Left column, full height: NASA AROW -->
    <section class="panel nasa-panel">
      <h2 class="panel-title">💫&nbsp;&nbsp;Mission Tracker</h2>
      <div class="panel-body">
        <iframe class="nasa" src="https://www.nasa.gov/missions/artemis-ii/arow/" title="NASA Artemis II AROW"></iframe>
      </div>
    </section>

    <!-- Top Right: YouTube -->
    <section class="panel">
      <h2 class="panel-title">🖥️&nbsp;&nbsp;NASA Livestream</h2>
      <div class="panel-body">
        <div class="yt-cell" id="player-top-right"></div>
      </div>
    </section>

    <!-- Bottom Right: YouTube -->
    <section class="panel">
      <h2 class="panel-title">🛰️&nbsp;&nbsp;Spacecraft Livestream</h2>
      <div class="panel-body">
        <div class="yt-cell" id="player-bottom-right"></div>
      </div>
    </section>
  </div>

  <script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      new YT.Player('player-top-right', {
        videoId: 'm3kR2KK8TEs',
        playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
        events: {
          onReady: function(e) {
            var f = e.target.getIframe();
            f.style.width = '100%';
            f.style.height = '100%';
            f.style.border = 'none';
          }
        }
      });

      new YT.Player('player-bottom-right', {
        videoId: '6RwfNBtepa4',
        playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
        events: {
          onReady: function(e) {
            var f = e.target.getIframe();
            f.style.width = '100%';
            f.style.height = '100%';
            f.style.border = 'none';
          }
        }
      });
    }
  </script>
</body>
</html>
