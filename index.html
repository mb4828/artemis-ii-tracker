<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Artemis II Tracker</title>
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-background" aria-hidden="true">
    <img src="background.jpg" alt="">
  </div>
  <div class="grid">
    <div class="left-column">
      <section class="panel nasa-panel">
        <h2 class="panel-title">💫&nbsp;&nbsp;Mission Tracker</h2>
        <div class="panel-body">
          <iframe class="nasa" src="https://www.nasa.gov/missions/artemis-ii/arow/" title="NASA Artemis II AROW"></iframe>
        </div>
      </section>

      <div class="mission-status">
        <section class="panel status-panel">
          <span class="status-label">Current Time</span>
          <span class="status-value" id="mission-time">--</span>
        </section>
        <section class="panel status-panel">
          <span class="status-label">Mission Elapsed Time</span>
          <span class="status-value" id="elapsed-time">--</span>
        </section>
      </div>
    </div>

    <div class="right-column">
      <!-- Top Right: YouTube -->
      <section class="panel video-panel">
        <h2 class="panel-title right">🖥️&nbsp;&nbsp;Main Livestream</h2>
        <div class="panel-body">
          <div class="video-frame">
            <div class="yt-cell" id="player-top-right"></div>
          </div>
        </div>
      </section>

      <!-- Bottom Right: YouTube -->
      <section class="panel video-panel">
        <h2 class="panel-title right">🛰️&nbsp;&nbsp;Spacecraft Livestream</h2>
        <div class="panel-body">
          <div class="video-frame">
            <div class="yt-cell" id="player-bottom-right"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="scripts.js" defer></script>
</body>
</html>
